version: '3.9'

services:
  # ─── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: estatex_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - estatex_network
    environment:
      MONGO_INITDB_DATABASE: estatex

  # ─── Backend API ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: estatex_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/estatex
      JWT_SECRET: estatex_super_secret_jwt_key_change_in_production_2025
      JWT_EXPIRE: 30d
      CLIENT_URL: http://localhost
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    networks:
      - estatex_network

  # ─── Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: estatex_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - estatex_network

networks:
  estatex_network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  uploads_data:
    driver: local
